<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试时段预约 - 公众端</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
        }

        body {
            background-color: #f5f7fa;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            padding: 30px;
            margin-bottom: 20px;
        }

        h1 {
            color: #2c3e50;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 2px solid #3498db;
        }

        .time-slots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .time-slot {
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .time-slot:hover {
            border-color: #3498db;
            transform: translateY(-3px);
        }

        .time-slot.selected {
            border-color: #2ecc71;
            background-color: #f8fff9;
        }

        .time-slot.full {
            border-color: #e74c3c;
            background-color: #fff5f5;
            cursor: not-allowed;
            opacity: 0.7;
        }

        .time-slot h3 {
            color: #2c3e50;
            margin-bottom: 10px;
        }

        .slot-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
        }

        .quota {
            color: #7f8c8d;
            font-size: 14px;
        }

        .quota.available {
            color: #27ae60;
            font-weight: bold;
        }

        .quota.full {
            color: #e74c3c;
            font-weight: bold;
        }

        .booking-form {
            margin-top: 30px;
            padding: 20px;
            border-top: 1px solid #e1e8ed;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 16px;
        }

        input:focus {
            outline: none;
            border-color: #3498db;
            box-shadow: 0 0 0 2px rgba(52, 152, 219, 0.2);
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #2980b9;
        }

        button:disabled {
            background-color: #95a5a6;
            cursor: not-allowed;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 6px;
            margin-top: 20px;
            display: none;
            text-align: center;
        }

        @media (max-width: 768px) {
            .time-slots {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="systemTitle">面试时段预约系统</h1>
        
        <div class="time-slots" id="timeSlots">
            <!-- 时段会通过JS动态生成 -->
        </div>

        <div class="booking-form">
            <h2>预约信息填写</h2>
            <div class="form-group">
                <label for="name">姓名</label>
                <input type="text" id="name" placeholder="请输入您的姓名" required>
            </div>
            <div class="form-group">
                <label for="phone">联系电话</label>
                <input type="tel" id="phone" placeholder="请输入您的联系电话" required>
            </div>
            <div class="form-group">
                <label for="email">电子邮箱</label>
                <input type="email" id="email" placeholder="请输入您的电子邮箱" required>
            </div>
            <button id="submitBtn" disabled>提交预约</button>
            
            <div class="success-message" id="successMsg">
                预约成功！我们会尽快与您联系确认。
            </div>
            <div class="error-message" id="errorMsg">
                预约失败，请选择有效的时段或检查您的信息。
            </div>
        </div>
    </div>

    <script>
        // 配置常量
        const DEFAULT_MAX_QUOTA = 6;
        const SELECTED_SLOT_KEY = 'selectedSlotId';
        const BOOKINGS_KEY = 'interviewBookings';
        const SYSTEM_TITLE_KEY = 'systemTitle';
        const DEFAULT_SYSTEM_TITLE = '面试时段预约系统';

        // 获取系统标题
        function getSystemTitle() {
            const savedTitle = localStorage.getItem(SYSTEM_TITLE_KEY);
            return savedTitle || DEFAULT_SYSTEM_TITLE;
        }

        // 更新页面显示的系统标题
        function updateSystemTitleDisplay() {
            const title = getSystemTitle();
            document.getElementById('systemTitle').textContent = title;
            document.title = `${title} - 公众端`;
        }

        // 初始化默认时段
        function initDefaultSlots() {
            const defaultSlots = [
                { id: 1, time: '2026-03-10 09:00-10:00', maxQuota: DEFAULT_MAX_QUOTA, bookings: [] },
                { id: 2, time: '2026-03-10 10:00-11:00', maxQuota: DEFAULT_MAX_QUOTA, bookings: [] },
                { id: 3, time: '2026-03-10 11:00-12:00', maxQuota: DEFAULT_MAX_QUOTA, bookings: [] },
                { id: 4, time: '2026-03-10 13:00-14:00', maxQuota: DEFAULT_MAX_QUOTA, bookings: [] },
                { id: 5, time: '2026-03-10 14:00-15:00', maxQuota: DEFAULT_MAX_QUOTA, bookings: [] },
                { id: 6, time: '2026-03-10 15:00-16:00', maxQuota: DEFAULT_MAX_QUOTA, bookings: [] },
            ];
            localStorage.setItem(BOOKINGS_KEY, JSON.stringify(defaultSlots));
            return defaultSlots;
        }

        // 从本地存储加载预约数据
        function loadBookings() {
            const saved = localStorage.getItem(BOOKINGS_KEY);
            return saved ? JSON.parse(saved) : initDefaultSlots();
        }

        // 保存预约数据到本地存储
        function saveBookings(bookings) {
            localStorage.setItem(BOOKINGS_KEY, JSON.stringify(bookings));
        }

        // 渲染时段列表
        function renderTimeSlots() {
            const slotsContainer = document.getElementById('timeSlots');
            const bookings = loadBookings();
            const selectedSlotId = localStorage.getItem(SELECTED_SLOT_KEY);

            slotsContainer.innerHTML = '';

            bookings.forEach(slot => {
                const isFull = slot.bookings.length >= slot.maxQuota;
                const isSelected = slot.id == selectedSlotId;
                const remaining = slot.maxQuota - slot.bookings.length;

                const slotElement = document.createElement('div');
                slotElement.className = `time-slot ${isSelected ? 'selected' : ''} ${isFull ? 'full' : ''}`;
                slotElement.innerHTML = `
                    <h3>${slot.time}</h3>
                    <div class="slot-info">
                        <span class="quota ${isFull ? 'full' : remaining > 0 ? 'available' : ''}">
                            ${isFull ? '名额已满' : `剩余名额: ${remaining}/${slot.maxQuota}`}
                        </span>
                    </div>
                `;

                // 只有未满的时段可以被选择
                if (!isFull) {
                    slotElement.addEventListener('click', () => {
                        // 移除之前的选中状态
                        document.querySelectorAll('.time-slot').forEach(el => {
                            el.classList.remove('selected');
                        });
                        // 添加新的选中状态
                        slotElement.classList.add('selected');
                        // 保存选中的时段ID
                        localStorage.setItem(SELECTED_SLOT_KEY, slot.id);
                        // 启用提交按钮
                        document.getElementById('submitBtn').disabled = false;
                    });
                }

                slotsContainer.appendChild(slotElement);
            });
        }

        // 提交预约
        function submitBooking() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const email = document.getElementById('email').value.trim();
            const selectedSlotId = localStorage.getItem(SELECTED_SLOT_KEY);

            // 验证输入
            if (!name || !phone || !email || !selectedSlotId) {
                showMessage('errorMsg');
                return;
            }

            const bookings = loadBookings();
            const slotIndex = bookings.findIndex(slot => slot.id == selectedSlotId);

            // 检查时段是否存在且未满
            if (slotIndex === -1 || bookings[slotIndex].bookings.length >= bookings[slotIndex].maxQuota) {
                showMessage('errorMsg');
                return;
            }

            // 添加预约信息
            bookings[slotIndex].bookings.push({
                name,
                phone,
                email,
                bookingTime: new Date().toLocaleString()
            });

            // 保存更新后的预约数据
            saveBookings(bookings);

            // 重置表单和选择状态
            document.getElementById('name').value = '';
            document.getElementById('phone').value = '';
            document.getElementById('email').value = '';
            localStorage.removeItem(SELECTED_SLOT_KEY);
            
            // 刷新时段显示
            renderTimeSlots();
            
            // 禁用提交按钮
            document.getElementById('submitBtn').disabled = true;
            
            // 显示成功消息
            showMessage('successMsg');
        }

        // 显示消息提示
        function showMessage(elementId) {
            // 隐藏所有消息
            document.getElementById('successMsg').style.display = 'none';
            document.getElementById('errorMsg').style.display = 'none';
            
            // 显示指定消息
            document.getElementById(elementId).style.display = 'block';
            
            // 3秒后自动隐藏
            setTimeout(() => {
                document.getElementById(elementId).style.display = 'none';
            }, 3000);
        }

        // 初始化页面
        function init() {
            // 初始化系统标题
            updateSystemTitleDisplay();
            
            renderTimeSlots();
            
            // 绑定提交按钮事件
            document.getElementById('submitBtn').addEventListener('click', submitBooking);
            
            // 检查是否有已选中的时段
            const selectedSlotId = localStorage.getItem(SELECTED_SLOT_KEY);
            if (selectedSlotId) {
                const bookings = loadBookings();
                const slot = bookings.find(s => s.id == selectedSlotId);
                if (slot && slot.bookings.length < slot.maxQuota) {
                    document.getElementById('submitBtn').disabled = false;
                }
            }
        }

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
