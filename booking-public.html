<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>面试时段预约 - 公众端</title>
    <style>
        body { padding: 20px; font-family: Arial; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #3498db; text-align: center; }
        .time-slot { border: 1px solid #ddd; padding: 10px; margin: 10px 0; cursor: pointer; }
        .time-slot:hover { border-color: #3498db; }
    </style>
</head>
<body>
    <div class="container">
        <h1>面试时段预约系统</h1>
        <div id="timeSlots">
            <div class="time-slot">2026-03-10 09:00-10:00 - 剩余名额：6/6</div>
            <div class="time-slot">2026-03-10 10:00-11:00 - 剩余名额：6/6</div>
        </div>
        <div>
            <h3>预约信息</h3>
            <input type="text" placeholder="姓名" style="width: 100%; padding: 8px; margin: 5px 0;">
            <input type="tel" placeholder="电话" style="width: 100%; padding: 8px; margin: 5px 0;">
            <button style="background: #3498db; color: white; border: none; padding: 10px 20px; cursor: pointer;">提交预约</button>
        </div>
    </div>
    <script>
        // 简单测试代码，确保JS运行
        console.log("预约系统加载成功！");
        alert("页面加载成功，这是测试提示！");
    </script>
</body>
</html>
